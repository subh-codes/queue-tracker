<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Hortons - Queue Tracker</title>

    <link rel="stylesheet" href="../css/trackinfo.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_back">

    <script src="../js/live.js" defer></script>
</head>

<body>
    <header>
        <div class="backbutton">
            <a href="stores.html" class="back-link">
                <span id="backarrow" class="material-symbols-outlined">arrow_back</span>
                <span id="back">Back</span>
            </a>
        </div>

        <div class="store-name">
            Tim Hortons — Queue Status
        </div>

        <div class="live-refresh">
            <span class="online-status">Live</span> Auto refresh every 1.5s
        </div>
    </header>

    <main>
        <div class="store-report">
            <div class="people-block">
                <div class="people">
                    <span class="number-of-people">12</span> people
                </div>

                <div class="status-row">
                    <span class="status">LOW</span>
                </div>
            </div>

            <div class="esttime">
                Estimated Wait: <span class="est">--</span> mins
            </div>

            <div class="lastupdstatus">
                Last Updated:
                <span class="hour">12</span>:
                <span class="mins">41</span>:
                <span class="secs">08</span>
            </div>
        </div>

        <div class="footer">
            <div class="busiest-time">
                <div class="foottitle">Busiest Time</div>
                <div class="footerfoot">
                    <span class="esthr1">12</span>:00 -
                    <span class="esthr2">1</span>:00 PM
                </div>
            </div>

            <div class="sensor-status">
                <div class="foottitle">Sensor Status</div>
                <div class="footerfoot">Online</div>
            </div>
        </div>
    </main>
</body>

</html>
