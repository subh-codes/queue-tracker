<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Management — Queue Monitoring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #05060A; color: white; min-height: 100vh; padding: 12px; }

        /* ── Header ── */
        header { min-height: 60px; border-bottom: 1px solid white; display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 12px 4px 14px; flex-wrap: wrap; }
        .back-link { text-decoration: none; color: rgba(255,255,255,0.5); font-family: Orbitron, sans-serif; font-size: 0.72rem; letter-spacing: 0.05em; transition: color 0.2s; }
        .back-link:hover { color: white; }
        .header-title { font-family: Orbitron, sans-serif; font-size: clamp(1rem,4vw,1.5rem); font-weight: bold; }
        .header-badge { font-size: 0.7rem; font-family: Orbitron, sans-serif; background: rgb(14,183,70); color: #05060A; padding: 3px 10px; border-radius: 6px; font-weight: bold; }

        /* ── Layout ── */
        main { display: flex; flex-direction: column; align-items: center; gap: 22px; margin-top: 28px; padding-bottom: 48px; }
        .section-label { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.35); font-family: Orbitron, sans-serif; width: 100%; max-width: 1100px; }

        /* ── Stat cards ── */
        .stats-row { width: 100%; max-width: 1100px; display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
        .stat-card { border: 2px solid white; border-radius: 16px; padding: 18px 14px; display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.4); font-family: Orbitron, sans-serif; }
        .stat-value { font-family: Orbitron, sans-serif; font-size: clamp(1.4rem,3vw,2rem); line-height: 1; }

        /* ── Tab bar ── */
        .tab-bar { width: 100%; max-width: 1100px; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
        .tab-btn { padding: 8px 20px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.5); font-family: Orbitron, sans-serif; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .tab-btn:hover { border-color: white; color: white; }
        .tab-btn.active { background: white; color: #05060A; border-color: white; }
        .tab-badge { font-size: 0.68rem; background: rgba(0,0,0,0.15); padding: 1px 7px; border-radius: 10px; font-family: sans-serif; }
        .tab-btn.active .tab-badge { background: rgba(0,0,0,0.2); }

        /* ── Search + filter bar ── */
        .toolbar { width: 100%; max-width: 1100px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .search-input { flex: 1; min-width: 180px; padding: 9px 14px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); color: white; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: rgb(14,183,70); }
        .search-input::placeholder { color: rgba(255,255,255,0.2); }
        .filter-btn { padding: 8px 14px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.45); font-family: Orbitron, sans-serif; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .filter-btn:hover { border-color: white; color: white; }
        .filter-btn.active { background: white; color: #05060A; border-color: white; }
        .filter-btn.high.active   { background: rgb(220,53,69);  border-color: rgb(220,53,69);  color: white; }
        .filter-btn.medium.active { background: rgb(255,170,0);  border-color: rgb(255,170,0);  color: black; }
        .filter-btn.low.active    { background: rgb(14,183,70);  border-color: rgb(14,183,70);  color: white; }

        /* ── Ticket cards ── */
        .ticket-list { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 12px; }

        .ticket-card { border: 2px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; transition: border-color 0.2s; }
        .ticket-card:hover { border-color: rgba(255,255,255,0.35); }
        .ticket-card.priority-high   { border-left: 4px solid rgb(220,53,69); }
        .ticket-card.priority-medium { border-left: 4px solid rgb(255,170,0); }
        .ticket-card.priority-low    { border-left: 4px solid rgb(14,183,70); }

        .ticket-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
        .ticket-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .ticket-id { font-family: Orbitron, sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.35); }

        .badge { font-family: Orbitron, sans-serif; font-size: 0.68rem; font-weight: bold; padding: 3px 10px; border-radius: 8px; }
        .badge.not-busy  { background: rgba(14,183,70,0.15);  color: rgb(14,183,70); }
        .badge.moderate  { background: rgba(255,170,0,0.15);  color: rgb(255,170,0); }
        .badge.busy      { background: rgba(220,53,69,0.15);  color: rgb(220,53,69); }
        .badge.high      { background: rgba(220,53,69,0.12);  color: rgb(220,53,69); }
        .badge.medium    { background: rgba(255,170,0,0.12);  color: rgb(255,170,0); }
        .badge.low       { background: rgba(14,183,70,0.12);  color: rgb(14,183,70); }
        .badge.open        { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
        .badge.in_progress { background: rgba(100,149,237,0.15); color: rgb(100,149,237); }
        .badge.resolved    { background: rgba(14,183,70,0.15);   color: rgb(14,183,70); }
        .badge.issue       { background: rgba(255,140,0,0.15);    color: rgb(255,140,0); }
        .badge.type-issue  { background: rgba(255,80,80,0.12);    color: rgb(255,120,120); font-size:0.62rem; }
        .badge.type-queue  { background: rgba(255,255,255,0.06);  color: rgba(255,255,255,0.4); font-size:0.62rem; }

        .ticket-comment { font-size: 0.95rem; color: rgba(255,255,255,0.8); line-height: 1.5; }
        .ticket-comment.empty { color: rgba(255,255,255,0.25); font-style: italic; }

        .ticket-time { font-size: 0.78rem; color: rgba(255,255,255,0.35); }

        /* Admin note */
        .admin-note-row { display: flex; gap: 8px; align-items: flex-start; }
        .admin-note-input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: white; font-size: 0.85rem; font-family: sans-serif; resize: none; outline: none; min-height: 36px; max-height: 100px; transition: border-color 0.2s; }
        .admin-note-input:focus { border-color: rgb(14,183,70); }
        .admin-note-input::placeholder { color: rgba(255,255,255,0.2); }

        /* Action buttons */
        .ticket-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .action-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.55); font-size: 0.78rem; cursor: pointer; transition: all 0.18s; font-family: sans-serif; }
        .action-btn:hover { border-color: white; color: white; }
        .action-btn.in-progress { border-color: rgb(100,149,237); color: rgb(100,149,237); }
        .action-btn.in-progress:hover { background: rgb(100,149,237); color: white; }
        .action-btn.resolve { border-color: rgb(14,183,70); color: rgb(14,183,70); }
        .action-btn.resolve:hover { background: rgb(14,183,70); color: #05060A; }
        .action-btn.reopen { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.5); }
        .action-btn.reopen:hover { border-color: white; color: white; }
        .action-btn.save-note { border-color: rgb(14,183,70); color: rgb(14,183,70); font-size: 0.72rem; padding: 6px 12px; }
        .action-btn.save-note:hover { background: rgb(14,183,70); color: #05060A; }
        .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .save-feedback { font-size: 0.75rem; color: rgb(14,183,70); display: none; }

        /* Empty state */
        .empty-state { width: 100%; max-width: 1100px; border: 2px dashed rgba(255,255,255,0.1); border-radius: 16px; padding: 52px 18px; text-align: center; color: rgba(255,255,255,0.25); font-size: 0.95rem; }

        /* Action bar */
        .action-bar { width: 100%; max-width: 1100px; display: flex; gap: 12px; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .refresh-info { font-size: 0.8rem; color: rgba(255,255,255,0.3); }
        .top-action-btn { padding: 9px 18px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.55); font-family: Orbitron, sans-serif; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; }
        .top-action-btn:hover { border-color: white; color: white; }
        .top-action-btn.danger:hover { border-color: rgb(220,53,69); color: rgb(220,53,69); }
        .top-action-btn.primary { background: rgb(14,183,70); border-color: rgb(14,183,70); color: #05060A; font-weight: bold; }
        .top-action-btn.primary:hover { background: rgb(10,150,55); }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .modal-overlay.visible { display: flex; }
        .modal { background: #05060A; border: 2px solid white; border-radius: 20px; padding: 30px 26px; max-width: 460px; width: 100%; display: flex; flex-direction: column; gap: 18px; }
        .modal-title { font-family: Orbitron, sans-serif; font-size: 1rem; }
        .modal-body { font-size: 0.9rem; color: rgba(255,255,255,0.65); line-height: 1.7; }
        .modal-body strong { color: white; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
        ::-webkit-scrollbar-thumb { background: rgba(14,183,70,0.35); border-radius: 4px; }

        @media (max-width: 768px) {
            .stats-row, .tab-bar, .toolbar, .ticket-list, .action-bar, .section-label { max-width: 420px; }
            .ticket-top { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <a href="admin_standalone.html" class="back-link">&#8592; Back to Dashboard</a>
    <div class="header-title">Ticket Management</div>
    <span class="header-badge">ADMIN</span>
</header>

<main>

    <!-- Stats -->
    <div class="section-label">Overview</div>
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total</div>
            <div class="stat-value" id="statTotal">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Open</div>
            <div class="stat-value" id="statOpen" style="color:rgba(255,255,255,0.7)">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">In Progress</div>
            <div class="stat-value" id="statInProgress" style="color:rgb(100,149,237)">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Resolved</div>
            <div class="stat-value" id="statResolved" style="color:rgb(14,183,70)">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">High Priority</div>
            <div class="stat-value" id="statHigh" style="color:rgb(220,53,69)">--</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="open"        onclick="setTab('open',this)">🔴 Open <span class="tab-badge" id="badgeOpen">0</span></button>
        <button class="tab-btn"        data-tab="in_progress" onclick="setTab('in_progress',this)">🔵 In Progress <span class="tab-badge" id="badgeInProgress">0</span></button>
        <button class="tab-btn"        data-tab="resolved"    onclick="setTab('resolved',this)">✅ Resolved <span class="tab-badge" id="badgeResolved">0</span></button>
        <button class="tab-btn"        data-tab="all"         onclick="setTab('all',this)">All <span class="tab-badge" id="badgeAll">0</span></button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <input type="text" class="search-input" id="searchInput" placeholder="Search by comment or ID..." oninput="renderTickets()">
        <button class="filter-btn active" data-priority="all"    onclick="setPriority('all',this)">All Priority</button>
        <button class="filter-btn high"   data-priority="high"   onclick="setPriority('high',this)">🔴 High</button>
        <button class="filter-btn medium" data-priority="medium" onclick="setPriority('medium',this)">🟡 Medium</button>
        <button class="filter-btn low"    data-priority="low"    onclick="setPriority('low',this)">🟢 Low</button>
    </div>

    <!-- Ticket list -->
    <div class="ticket-list" id="ticketList">
        <div class="empty-state">Loading tickets from Azure...</div>
    </div>

    <!-- Bottom action bar -->
    <div class="action-bar">
        <span class="refresh-info" id="refreshInfo">Auto-refreshes every 15s</span>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button class="top-action-btn" onclick="exportCSV()">⬇ Export CSV</button>
            <button class="top-action-btn danger" onclick="showClearModal()">🗑 Clear All</button>
        </div>
    </div>

</main>

<!-- Clear modal -->
<div class="modal-overlay" id="clearModal">
    <div class="modal">
        <div class="modal-title">Clear All Tickets?</div>
        <div class="modal-body">Permanently deletes <strong id="clearCount">all</strong> tickets from Azure Blob Storage.<br><br>This <strong>cannot be undone.</strong></div>
        <div class="modal-actions">
            <button class="top-action-btn" onclick="hideClearModal()">Cancel</button>
            <button class="top-action-btn primary" onclick="clearAll()">Yes, Delete All</button>
        </div>
    </div>
</div>

<script>
    let allTickets    = [];
    let activeTab     = "open";
    let activePriority = "all";

    /* ── Load ── */
    async function loadTickets() {
        try {
            const res = await fetch("/tickets");
            if (!res.ok) throw new Error();
            allTickets = (await res.json()).slice().reverse();
            // Ensure fields exist for old tickets
            allTickets = allTickets.map(t => ({
                ticket_status: "open",
                priority:      t.reported_status === "BUSY" ? "high" : t.reported_status === "MODERATE" ? "medium" : "low",
                admin_note:    "",
                ...t
            }));
            updateStats();
            updateBadges();
            renderTickets();
            const now = new Date();
            document.getElementById("refreshInfo").textContent =
                "Last refreshed: " + pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());
        } catch (e) {
            document.getElementById("ticketList").innerHTML =
                '<div class="empty-state">Could not load tickets. Push the updated server.js to GitHub first.</div>';
        }
    }

    /* ── Stats ── */
    function updateStats() {
        setText("statTotal",      allTickets.length);
        setText("statOpen",       allTickets.filter(t => t.ticket_status === "open").length);
        setText("statInProgress", allTickets.filter(t => t.ticket_status === "in_progress").length);
        setText("statResolved",   allTickets.filter(t => t.ticket_status === "resolved").length);
        setText("statHigh",       allTickets.filter(t => t.priority === "high").length);
    }

    function updateBadges() {
        setText("badgeOpen",       allTickets.filter(t => t.ticket_status === "open").length);
        setText("badgeInProgress", allTickets.filter(t => t.ticket_status === "in_progress").length);
        setText("badgeResolved",   allTickets.filter(t => t.ticket_status === "resolved").length);
        setText("badgeAll",        allTickets.length);
    }

    /* ── Tab / priority ── */
    function setTab(tab, btn) {
        activeTab = tab;
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderTickets();
    }

    function setPriority(p, btn) {
        activePriority = p;
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderTickets();
    }

    /* ── Render ── */
    function renderTickets() {
        const search = (document.getElementById("searchInput").value || "").toLowerCase();
        const list   = document.getElementById("ticketList");

        let filtered = allTickets;

        if (activeTab !== "all") {
            filtered = filtered.filter(t => t.ticket_status === activeTab);
        }
        if (activePriority !== "all") {
            filtered = filtered.filter(t => t.priority === activePriority);
        }
        if (search) {
            filtered = filtered.filter(t =>
                (t.comment || "").toLowerCase().includes(search) ||
                String(t.id).includes(search)
            );
        }

        if (!filtered.length) {
            const msgs = {
                open:        "No open tickets. 🎉",
                in_progress: "No tickets currently in progress.",
                resolved:    "No resolved tickets yet.",
                all:         "No tickets match your filter."
            };
            list.innerHTML = `<div class="empty-state">${msgs[activeTab] || "No tickets."}</div>`;
            return;
        }

        list.innerHTML = filtered.map(t => buildCard(t)).join("");
    }

    function buildCard(t) {
        const sc = scClass || "issue";
        const prio = t.priority || "low";
        const ts   = t.ticket_status || "open";

        const statusLabel = ts === "in_progress" ? "In Progress" : ts.charAt(0).toUpperCase() + ts.slice(1);
        const typeBadge = t.type === "problem_report"
            ? '<span class="badge type-issue">⚠ PROBLEM REPORT</span>'
            : '<span class="badge type-queue">QUEUE REPORT</span>';
        const scClass = t.reported_status === "NOT BUSY" ? "not-busy"
                      : t.reported_status === "MODERATE"  ? "moderate"
                      : t.reported_status === "BUSY"      ? "busy" : "issue";

        const actions = ts === "open"
            ? `<button class="action-btn in-progress" onclick="updateStatus('${t.id}','in_progress')">▶ In Progress</button>
               <button class="action-btn resolve"     onclick="updateStatus('${t.id}','resolved')">✔ Resolve</button>`
            : ts === "in_progress"
            ? `<button class="action-btn resolve" onclick="updateStatus('${t.id}','resolved')">✔ Resolve</button>
               <button class="action-btn reopen"  onclick="updateStatus('${t.id}','open')">↩ Reopen</button>`
            : `<button class="action-btn reopen" onclick="updateStatus('${t.id}','open')">↩ Reopen</button>`;

        const noteVal = (t.admin_note || "").replace(/"/g, "&quot;");
        const updatedStr = t.updated_at ? "  · Updated " + formatTime(t.updated_at) : "";

        return `<div class="ticket-card priority-${prio}" id="card-${t.id}">
            <div class="ticket-top">
                <div class="ticket-meta">
                    <span class="ticket-id">#${t.id}</span>
                    <span class="badge ${sc}">${t.reported_status}</span>
                    <span class="badge ${prio}">${prio.toUpperCase()} PRIORITY</span>
                    <span class="badge ${ts}">${statusLabel}</span>
                    ${typeBadge}
                </div>
                <span class="ticket-time">${formatTime(t.submitted_at)}${updatedStr}</span>
            </div>
            <div class="ticket-comment ${!t.comment ? 'empty' : ''}">${t.comment || 'No comment provided'}</div>
            <div class="admin-note-row">
                <textarea class="admin-note-input" id="note-${t.id}" placeholder="Add admin note..." rows="1">${noteVal}</textarea>
                <button class="action-btn save-note" onclick="saveNote('${t.id}')">Save Note</button>
                <span class="save-feedback" id="noteFb-${t.id}">Saved ✓</span>
            </div>
            <div class="ticket-actions">
                ${actions}
            </div>
        </div>`;
    }

    /* ── Update status ── */
    async function updateStatus(id, newStatus) {
        const card = document.getElementById("card-" + id);
        if (card) card.style.opacity = "0.5";
        try {
            const res = await fetch("/tickets/" + id, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ticket_status: newStatus })
            });
            if (!res.ok) throw new Error();
            // Update local
            const idx = allTickets.findIndex(t => String(t.id) === String(id));
            if (idx !== -1) {
                allTickets[idx].ticket_status = newStatus;
                allTickets[idx].updated_at    = new Date().toISOString();
            }
            updateStats(); updateBadges(); renderTickets();
        } catch (e) {
            if (card) card.style.opacity = "1";
            alert("Could not update ticket. Try again.");
        }
    }

    /* ── Save note ── */
    async function saveNote(id) {
        const noteEl = document.getElementById("note-" + id);
        const fbEl   = document.getElementById("noteFb-" + id);
        const note   = noteEl ? noteEl.value.trim() : "";
        try {
            const res = await fetch("/tickets/" + id, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ note })
            });
            if (!res.ok) throw new Error();
            const idx = allTickets.findIndex(t => String(t.id) === String(id));
            if (idx !== -1) allTickets[idx].admin_note = note;
            if (fbEl) { fbEl.style.display = "inline"; setTimeout(() => fbEl.style.display = "none", 2000); }
        } catch (e) {
            alert("Could not save note.");
        }
    }

    /* ── Clear all ── */
    function showClearModal() {
        document.getElementById("clearCount").textContent =
            allTickets.length + " ticket" + (allTickets.length !== 1 ? "s" : "");
        document.getElementById("clearModal").classList.add("visible");
    }
    function hideClearModal() { document.getElementById("clearModal").classList.remove("visible"); }

    async function clearAll() {
        try {
            const res = await fetch("/clear-tickets", { method: "POST" });
            if (res.ok) { allTickets = []; updateStats(); updateBadges(); renderTickets(); hideClearModal(); }
            else alert("Could not clear tickets.");
        } catch (e) { alert("Error: " + e.message); }
    }

    /* ── Export CSV ── */
    function exportCSV() {
        if (!allTickets.length) { alert("No tickets to export."); return; }
        const header = "Ticket ID,Store,Reported Status,Priority,Ticket Status,Comment,Admin Note,Submitted At,Updated At";
        const rows   = allTickets.map(t =>
            `"${t.id||""}","${t.store||""}","${t.reported_status||""}","${t.priority||""}","${t.ticket_status||""}","${(t.comment||"").replace(/"/g,'""')}","${(t.admin_note||"").replace(/"/g,'""')}","${t.submitted_at||""}","${t.updated_at||""}"`
        );
        const blob = new Blob([[header,...rows].join("\n")], { type: "text/csv" });
        const url  = URL.createObjectURL(blob);
        const a    = Object.assign(document.createElement("a"), { href: url, download: "tickets_" + new Date().toISOString().slice(0,10) + ".csv" });
        a.click(); URL.revokeObjectURL(url);
    }

    /* ── Helpers ── */
    function formatTime(iso) {
        if (!iso) return "--";
        const d = new Date(iso);
        return d.toLocaleDateString("en-CA") + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
    }
    function pad(n) { return String(n).padStart(2,"0"); }
    function setText(id, val) { const e = document.getElementById(id); if (e) e.textContent = val; }

    /* ── Start ── */
    loadTickets();
    setInterval(loadTickets, 15000);
</script>
</body>
</html>
